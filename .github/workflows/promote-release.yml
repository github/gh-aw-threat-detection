name: Promote Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to promote (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment:
      name: release-promote
    env:
      PROMOTE_TAG: ${{ inputs.tag }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify prerelease exists
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IMAGE="ghcr.io/github/gh-aw-threat-detection"
          LIFECYCLE_REGISTRY="releases/threat-detection-lifecycle.json"
          RELEASE_INFO=$(gh release view "$PROMOTE_TAG" --json body,isPrerelease,tagName)
          LIFECYCLE_STATUS=$(jq -r --arg version "$PROMOTE_TAG" '.releases[]? | select(.version == $version) | .status' "$LIFECYCLE_REGISTRY" | head -n 1)
          if [ "$LIFECYCLE_STATUS" = "yanked" ] || [ "$LIFECYCLE_STATUS" = "obsolete" ]; then
            echo "::error::Release ${PROMOTE_TAG} is ${LIFECYCLE_STATUS} in ${LIFECYCLE_REGISTRY}. Refusing to promote it to latest."
            exit 1
          fi
          IS_PRERELEASE=$(echo "$RELEASE_INFO" | jq -r '.isPrerelease')
          if [ "$IS_PRERELEASE" != "true" ]; then
            echo "::error::Release ${PROMOTE_TAG} is not a prerelease. Nothing to promote."
            exit 1
          fi
          DIGEST_LINE_PREFIX="Container image digest: ${IMAGE}@"
          IMAGE_REF_PREFIX="${IMAGE}@sha256:"
          EXPECTED_SHA256_LENGTH=64
          IMAGE_REF=""
          while IFS= read -r line; do
            case "$line" in
              "$DIGEST_LINE_PREFIX"*)
                IMAGE_REF="${line#Container image digest: }"
                break
                ;;
            esac
          done < <(echo "$RELEASE_INFO" | jq -r '.body // ""')
          if [ -z "$IMAGE_REF" ]; then
            echo "::error::Release ${PROMOTE_TAG} does not record a container image digest. Nothing to promote."
            exit 1
          fi
          case "$IMAGE_REF" in
            "$IMAGE_REF_PREFIX"*) ;;
            *)
              echo "::error::Release ${PROMOTE_TAG} records a container image digest that does not use sha256. Nothing to promote."
              exit 1
              ;;
          esac
          DIGEST="${IMAGE_REF#${IMAGE_REF_PREFIX}}"
          if [ "${#DIGEST}" -ne "$EXPECTED_SHA256_LENGTH" ]; then
            echo "::error::Release ${PROMOTE_TAG} records a container image digest with an invalid length. Nothing to promote."
            exit 1
          fi
          if ! echo "$DIGEST" | grep -Eq '^[0-9a-f]+$'; then
            echo "::error::Release ${PROMOTE_TAG} records a container image digest with non-hex characters. Nothing to promote."
            exit 1
          fi
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "✅ Verified ${PROMOTE_TAG} is a prerelease with container image ${IMAGE_REF} — proceeding with promotion."

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag container image as latest
        run: |
          IMAGE="ghcr.io/github/gh-aw-threat-detection"
          docker pull "${{ steps.verify.outputs.image_ref }}"
          docker tag "${{ steps.verify.outputs.image_ref }}" "${IMAGE}:latest"
          docker push "${IMAGE}:latest"
          echo "✅ Container image tagged as latest."

      - name: Promote release to stable
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "$PROMOTE_TAG" --prerelease=false --latest
          echo "✅ Release ${PROMOTE_TAG} promoted to stable and marked as Latest."
