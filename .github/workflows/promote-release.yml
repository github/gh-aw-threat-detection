name: Promote Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to promote (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment:
      name: release-promote
    steps:
      - name: Verify prerelease exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_INFO=$(gh release view "${{ inputs.tag }}" --json isPrerelease,tagName)
          IS_PRERELEASE=$(echo "$RELEASE_INFO" | jq -r '.isPrerelease')
          if [ "$IS_PRERELEASE" != "true" ]; then
            echo "::error::Release ${{ inputs.tag }} is not a prerelease. Nothing to promote."
            exit 1
          fi
          echo "✅ Verified ${{ inputs.tag }} is a prerelease — proceeding with promotion."

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag container image as latest
        run: |
          IMAGE="ghcr.io/github/gh-aw-threat-detection"
          docker pull "${IMAGE}:${{ inputs.tag }}"
          docker tag "${IMAGE}:${{ inputs.tag }}" "${IMAGE}:latest"
          docker push "${IMAGE}:latest"
          echo "✅ Container image tagged as latest."

      - name: Promote release to stable
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ inputs.tag }}" --prerelease=false
          echo "✅ Release ${{ inputs.tag }} promoted to stable."
