name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test -v -race ./...

      - name: Build release binary
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X github.com/github/gh-aw-threat-detection/pkg/detector.Version=${VERSION}" \
            -o dist/threat-detect-linux-amd64 ./cmd/threat-detect

      - name: Generate checksums
        run: |
          cd dist
          sha256sum threat-detect-linux-amd64 > checksums.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*
          retention-days: 7

  publish-release:
    needs: build-release-artifacts
    runs-on: ubuntu-latest
    environment:
      name: release-publish
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/github/gh-aw-threat-detection:${{ github.ref_name }}

      - name: Create GitHub release (prerelease)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IMAGE="ghcr.io/github/gh-aw-threat-detection"
          gh release create "${GITHUB_REF_NAME}" \
            dist/threat-detect-linux-amd64#threat-detect-linux-amd64 \
            dist/checksums.txt#checksums.txt \
            --title "${GITHUB_REF_NAME}" \
            --notes "Container image digest: ${IMAGE}@${{ steps.build-image.outputs.digest }}" \
            --generate-notes \
            --prerelease
