name: Smoke

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch smoke workflows
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          workflows=(
            smoke-copilot.lock.yml
            smoke-claude.lock.yml
            smoke-codex.lock.yml
            smoke-copilot-container.lock.yml
            smoke-claude-container.lock.yml
            smoke-codex-container.lock.yml
          )

          failures=()
          for workflow in "${workflows[@]}"; do
            if gh workflow run "$workflow" --repo "$REPO" --ref "$REF"; then
              echo "Dispatched $workflow"
            else
              echo "Failed to dispatch $workflow" >&2
              failures+=("$workflow")
            fi
          done

          if [ "${#failures[@]}" -gt 0 ]; then
            printf 'Failed to dispatch %d workflow(s):\n' "${#failures[@]}" >&2
            printf '  %s\n' "${failures[@]}" >&2
            exit 1
          fi
